<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ink Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="eink-flash"></div>

    <div class="desktop">
        
        <div id="page-dashboard" class="page-content active">
            <div class="win-window clock-section">
                <div class="win-titlebar">
                    <span>System_Clock.exe</span>
                    <div class="win-controls"><button>X</button></div>
                </div>
                <div class="win-body">
                    <div class="clock-container">
                        <div class="flip-card"><span id="hour-box">00</span></div>
                        <div class="time-colon">:</div>
                        <div class="flip-card"><span id="minute-box">00</span></div>
                    </div>
                    <div class="date-text" id="date">读取日期...</div>
                </div>
            </div>

            <div class="win-window weather-section">
                <div class="win-titlebar">
                    <span>Weather_Monitor.dll</span>
                </div>
                <div class="win-body sunken-panel weather-panel">
                    <div class="current-weather" id="current_weather">
                        <div id="cw-icon" class="cw-icon-box"></div>
                        <div id="cw-text">连接气象卫星中...</div>
                    </div>
                    <div class="forecast-list" id="forecast_list">
                        </div>
                </div>
            </div>

            <div class="win-window quote-section">
                <div class="win-titlebar">
                    <span>Quote_of_the_day.txt</span>
                </div>
                <div class="win-body sunken-panel quote-panel">
                    <div id="hitokoto">「 初始化系统内核... 」</div>
                </div>
            </div>
        </div>

        <div id="page-news" class="page-content">
            <div class="win-window news-section">
                <div class="win-titlebar">
                    <span>Tech_News_Explorer.exe</span>
                    <div class="win-controls"><button>_</button><button>□</button><button>X</button></div>
                </div>
                
                <div class="win-toolbar" style="justify-content: space-between;">
    <button class="win-btn tool-btn" onclick="openSettingsModal()">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>设置(S)</span>
    </button>
    
    <div style="display: flex; align-items: center; gap: 6px;">
        <button class="win-btn tool-btn" onclick="changeNewsPage(-1)">&lt; 上一页</button>
        <span id="news-page-info" style="font-size: 0.95rem; font-weight: bold; width: 80px; text-align: center;">- / -</span>
        <button class="win-btn tool-btn" onclick="changeNewsPage(1)">下一页 &gt;</button>
    </div>
</div>

                <div class="win-body sunken-panel news-panel">
                    <ul id="news-list">
                        <li>正在通过 RSS 拨号获取 IT 资讯...</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <div class="taskbar">
        <div class="taskbar-left">
            <button class="win-btn start-btn" id="theme-toggle" onclick="toggleTheme()">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
                </svg>
                <b>反色</b>
            </button>
            <div class="divider"></div>
            <button class="win-btn task-btn active" onclick="switchPage('dashboard', this)">控制台</button>
            <button class="win-btn task-btn" onclick="switchPage('news', this)">新闻</button>
        </div>
        <div class="taskbar-right sunken-panel tray-clock">
            <span id="tray-time">00:00</span>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="win-window modal-window">
            <div class="win-titlebar">
                <span>RSS_Settings.exe</span>
                <div class="win-controls"><button onclick="closeSettingsModal()">X</button></div>
            </div>
            <div class="win-body">
                <fieldset class="win-fieldset">
                    <legend>选择资讯来源</legend>
                    <div class="radio-group">
                        <label><input type="radio" name="rss-type" value="default" onchange="toggleRssInput()"> 默认 (IT之家)</label>
                    </div>
                    <div class="radio-group">
                        <label><input type="radio" name="rss-type" value="custom" onchange="toggleRssInput()"> 自定义 RSS 链接</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="custom-rss-url" class="win-input sunken-panel" placeholder="例如: https://v2ex.com/index.xml" disabled>
                    </div>
                </fieldset>
                <div class="modal-actions">
                    <button class="win-btn" onclick="saveSettings()">确定</button>
                    <button class="win-btn" onclick="closeSettingsModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=3.0"></script>
</body>
</html>
